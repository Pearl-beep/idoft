name: Reproduce Apache Pinot ID flaky test with NonDex

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/pinot-json-nondex.yml"

permissions:
  contents: read

jobs:
  reproduce-pinot-flaky-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      MAVEN_OPTS: "-Xmx4g"

    steps:
      - name: Check out IDoFT fork
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Show Java and Maven versions
        run: |
          java -version
          mvn -version

      - name: Clone Apache Pinot latest master
        run: |
          git clone --depth 1 --branch master https://github.com/apache/pinot.git
          cd pinot
          echo "Pinot commit tested:"
          git rev-parse HEAD

      - name: Build pinot-core and dependencies without running tests
        working-directory: pinot
        run: |
          chmod +x ./mvnw
          ./mvnw -B -ntp \
            -pl pinot-core -am \
            clean install \
            -DskipTests \
            -Ppinot-fastdev

      - name: Run test normally without NonDex - expected PASS
        working-directory: pinot
        run: |
          ./mvnw -B -ntp \
            -pl pinot-core \
            -Dtest=org.apache.pinot.queries.JsonIngestionFromAvroQueriesTest#testJsonPathSelectOnJsonColumn \
            -DreuseForks=false \
            test

      - name: Run test with NonDex - expected FAIL
        id: nondex
        continue-on-error: true
        working-directory: pinot
        run: |
          ./mvnw -B -ntp \
            -pl pinot-core \
            -Dtest=org.apache.pinot.queries.JsonIngestionFromAvroQueriesTest#testJsonPathSelectOnJsonColumn \
            -DreuseForks=false \
            -DnondexRuns=1 \
            -DnondexRunsWithoutShuffling=0 \
            -DnondexSeed=974622 \
            edu.illinois:nondex-maven-plugin:2.2.1:nondex

      - name: Confirm that NonDex exposed the flaky test
        if: always()
        run: |
          echo "Normal Maven test passed before the NonDex step."
          echo "NonDex step outcome: ${{ steps.nondex.outcome }}"

          if [ "${{ steps.nondex.outcome }}" != "failure" ]; then
            echo "::error::Expected the NonDex command to fail, but it did not."
            exit 1
          fi

          echo "Success: the test passes normally but fails under NonDex."

